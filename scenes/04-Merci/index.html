<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Scene 04 - Merci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene" role="img" aria-label="Scene de remerciement">
      <div class="scene__overlay" aria-hidden="true"></div>

      <section class="thanks" aria-label="Message de remerciement">
        <p class="thanks__kicker" id="thanksKicker">SESSION TERMINEE</p>
        <h1 class="thanks__title">MERCI</h1>
        <p class="thanks__subtitle" id="thanksSubtitle">RENDEZ-VOUS AU PROCHAIN LIVE</p>
      </section>

      <footer class="signature" aria-label="Signature">
        <img src="../assets/logos/logo-jg.svg" alt="JG" class="signature__logo" />
        <span class="signature__text" id="signatureText">FR RACING TEAM</span>
      </footer>

      <section class="final-logo" aria-label="Logo final">
        <img src="../assets/logos/logo-jg.svg" alt="JG" class="final-logo__image" />
      </section>
    </main>

    <script src="../live-config.js" defer></script>
    <script src="./script.js" defer></script>
  </body>
</html>
