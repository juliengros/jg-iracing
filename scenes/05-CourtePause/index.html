<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Scene 05 - Courte Pause</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene" role="img" aria-label="Scene courte pause animee">
      <div class="scene__background" aria-hidden="true"></div>
      <div class="scene__overlay" aria-hidden="true"></div>
      <div class="scene__grid" aria-hidden="true"></div>

      <header class="top-strip" aria-label="Bandeau live">
        <section class="top-strip__left" aria-label="Logo et index live">
          <img src="../assets/logos/logo-jg.svg" alt="JG" class="top-strip__brand-logo" />
          <span class="info-pill info-pill--live" id="liveLabel">LIVE #005</span>
        </section>

        <section class="top-strip__center" aria-label="Informations live">
          <span class="info-pill" id="eventLabel">COURTE PAUSE</span>
          <span class="info-sep" aria-hidden="true">|</span>
          <span class="info-pill" id="carLabel">REPRISE IMMINENTE</span>
        </section>

        <section class="top-strip__right" aria-label="Team">
          <span class="info-pill info-pill--team" id="teamLabel">FR RACING TEAM</span>
        </section>
      </header>

      <section class="pause-panel" aria-label="Etat de pause">
        <div class="pause-panel__orbiter" aria-hidden="true">
          <div class="pause-panel__ring"></div>
          <div class="pause-panel__ring pause-panel__ring--inner"></div>
          <div class="pause-panel__core"></div>
        </div>

        <p class="pause-panel__kicker">STREAM STATUS</p>
        <h1 class="pause-panel__title">COURTE PAUSE</h1>
        <p class="pause-panel__subtitle" id="pauseStatus">ON REVIENT DANS QUELQUES MINUTES</p>

        <div class="pause-panel__bars" aria-hidden="true">
          <span class="bar bar--1"></span>
          <span class="bar bar--2"></span>
          <span class="bar bar--3"></span>
          <span class="bar bar--4"></span>
          <span class="bar bar--5"></span>
        </div>
      </section>
    </main>

    <script src="../live-config.js" defer></script>
    <script src="./script.js" defer></script>
  </body>
</html>
