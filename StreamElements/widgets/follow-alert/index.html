<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamElements Follow Alert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" role="img" aria-label="StreamElements follow alert preview">
      <section class="alert" id="alertRoot" aria-live="polite">
        <div class="alert__brand" aria-hidden="true">
          <img
            src="https://raw.githubusercontent.com/juliengros/jg-iracing/main/StreamElements/assets/logo-jg.svg"
            alt=""
            class="alert__brand-logo"
            data-default-logo-url="https://raw.githubusercontent.com/juliengros/jg-iracing/main/StreamElements/assets/logo-jg.svg"
          />
        </div>
        <div class="alert__content">
          <h1 class="alert__title" id="followTitle">THANKS FOR FOLLOWING</h1>
          <p class="alert__user" id="followUser">@new_follower</p>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
